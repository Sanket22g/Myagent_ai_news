services:
  - type: web
    name: ai-research-digest-api
    env: python
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME # Update this to your repo URL later
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn push_to_mongo:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: MONGODB_URI
        sync: false # Render will prompt you for this value in the dashboard
      - key: MONGODB_DB
        sync: false
      - key: MONGODB_COLLECTION
        sync: false
      - key: OPENAI_API_KEY
        sync: false
